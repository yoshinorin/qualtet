get:
  summary: Get a feeds
  description: |
    Retrieves a feed containing the most recent articles. The response includes an array of feed items. Each feed item represents an article, sorted by published date in descending order. The number of articles returned is configurable via the `QUALTET_FEED_LIMIT` environment variable (default: 5).
  tags:
    - Feed
  responses:
    200:
      description: Response when Success
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../components/schemas/response/feed.yml'
